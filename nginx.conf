server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Чистые URL: /step-1-clone → /step-1-clone.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # HTML — без агрессивного кэша, чтобы правки сразу видны
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # CSS можно кэшировать на час
    location ~* \.(css|js)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate" always;
    }

    # Безопасность
    add_header X-Frame-Options "SAMEORIGIN" always;
    server_tokens off;

    # gzip для текстового контента
    gzip on;
    gzip_types text/plain text/css text/html application/javascript application/json;
    gzip_min_length 256;
}
