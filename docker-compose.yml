services:
  claw-site:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      # Публикуем на 8084 хоста — системный nginx проксирует к этому порту.
      # AI-агент (sl-claw) занимает 8071, Coolify сам — 8070, 8080-8083 заняты.
      - "127.0.0.1:8084:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
